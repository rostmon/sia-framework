hazards:
  HZ-01:
    failure_mode: "PII Leakage"
    hazard_description: "Data Breach, GDPR violation."
    pre_mitigation_severity: 4
    pre_mitigation_probability: 5
    sia_mitigation_logic: "STRIP_PII"
    mitigation_description: "Dynamic regex-based ingress sanitizer that redacts sensitive personal data before network transit."
    residual_severity: 4
    residual_probability: 1

  HZ-02:
    failure_mode: "Lack of Traceability"
    hazard_description: "Non-compliance, lack of accountability."
    pre_mitigation_severity: 3
    pre_mitigation_probability: 5
    sia_mitigation_logic: "REQUIRE_TRACEABILITY_HASH"
    mitigation_description: "Traceability engine hashes all system interactions with SHA-256 into the immutable audit ledger."
    residual_severity: 3
    residual_probability: 1

  HZ-03:
    failure_mode: "Automation Bias"
    hazard_description: "Overreliance, user error due to trusting AI blindly."
    pre_mitigation_severity: 3
    pre_mitigation_probability: 4
    sia_mitigation_logic: "APPEND_WATERMARK"
    mitigation_description: "Transparency engine automatically appends clear machine and human-readable warnings to compliant outputs."
    residual_severity: 3
    residual_probability: 1

  HZ-04:
    failure_mode: "Automated High-Risk Decision"
    hazard_description: "Discrimination, Loss of Rights."
    pre_mitigation_severity: 5
    pre_mitigation_probability: 5
    sia_mitigation_logic: "REQUIRE_HUMAN_VETO"
    mitigation_description: "Human-in-the-Loop gate triggering an HTTP 202 to pause execution for a mandatory human signature on Annex III tasks."
    residual_severity: 5
    residual_probability: 1

  HZ-05:
    failure_mode: "Data Drift"
    hazard_description: "Model degradation over time, reduced accuracy."
    pre_mitigation_severity: 3
    pre_mitigation_probability: 5
    sia_mitigation_logic: "MONITOR_CONFIDENCE_DRIFT"
    mitigation_description: "Active post-market monitoring using statistical heuristics to track shifts in input distributions against baselines."
    residual_severity: 3
    residual_probability: 2

  HZ-06:
    failure_mode: "Hallucination / Confabulation"
    hazard_description: "User harm, misdiagnosis."
    pre_mitigation_severity: 4
    pre_mitigation_probability: 4
    sia_mitigation_logic: "BLOCK_AND_REWRITE"
    mitigation_description: "Truth Razor grounding engine requires a minimum confidence threshold, rewriting failures into a safe deterministic fallback."
    residual_severity: 4
    residual_probability: 1

  HZ-07:
    failure_mode: "Prompt Injection"
    hazard_description: "Unintended system behavior, jailbreak."
    pre_mitigation_severity: 4
    pre_mitigation_probability: 4
    sia_mitigation_logic: "BLOCK_PROMPT_INJECTION"
    mitigation_description: "Adversarial intent classifier that blocks inputs matching known jailbreak or instruction-override patterns."
    residual_severity: 4
    residual_probability: 1

  HZ-08:
    failure_mode: "Data Poisoning / Anomaly"
    hazard_description: "Systematic failure due to corrupted input distribution."
    pre_mitigation_severity: 4
    pre_mitigation_probability: 3
    sia_mitigation_logic: "MONITOR_ANOMALIES"
    mitigation_description: "Automated risk management control detecting extreme payload sizes and unusual non-standard character density."
    residual_severity: 4
    residual_probability: 1

  HZ-09:
    failure_mode: "Unacceptable Risk Practice"
    hazard_description: "Violation of Article 5 (e.g., social scoring, biometric categorization)."
    pre_mitigation_severity: 5
    pre_mitigation_probability: 4
    sia_mitigation_logic: "BLOCK_PROHIBITED_DOMAINS"
    mitigation_description: "Ingress semantic filter that proactively drops interactions matching explicitly prohibited AI use-cases."
    residual_severity: 5
    residual_probability: 1

  HZ-10:
    failure_mode: "Resource Exhaustion"
    hazard_description: "Denial of Service, performance degradation."
    pre_mitigation_severity: 3
    pre_mitigation_probability: 5
    sia_mitigation_logic: "ENFORCE_TOKEN_LIMIT"
    mitigation_description: "Limits the maximum number of tokens per request to prevent infrastructure exhaustion and buffer overflows."
    residual_severity: 3
    residual_probability: 1

  HZ-11:
    failure_mode: "High-Frequency Abuse"
    hazard_description: "Brute force attacks, service unavailability."
    pre_mitigation_severity: 3
    pre_mitigation_probability: 5
    sia_mitigation_logic: "ENFORCE_RATE_LIMIT"
    mitigation_description: "In-memory sliding window rate limiter enforcing maximum requests per minute per client session."
    residual_severity: 3
    residual_probability: 1

  HZ-12:
    failure_mode: "Subliminal/Exploitative Practice"
    hazard_description: "Violation of Article 5 (e.g., subliminal manipulation, exploiting vulnerabilities, RTBI)."
    pre_mitigation_severity: 5
    pre_mitigation_probability: 3
    sia_mitigation_logic: "BLOCK_PROHIBITED_PRACTICES"
    mitigation_description: "Proactively drops interactions matching unequivocally prohibited AI practices."
    residual_severity: 5
    residual_probability: 1

  HZ-13:
    failure_mode: "Unauthorized Sensitive Data Usage"
    hazard_description: "Processing special categories of personal data (Article 10.5)."
    pre_mitigation_severity: 4
    pre_mitigation_probability: 4
    sia_mitigation_logic: "BLOCK_SPECIAL_CATEGORY_DATA"
    mitigation_description: "Blocks inputs containing health, genetic, racial, or political data unless strictly necessary."
    residual_severity: 4
    residual_probability: 1

  HZ-14:
    failure_mode: "User Misunderstanding"
    hazard_description: "User relies on AI output without understanding capabilities/limitations (Article 13)."
    pre_mitigation_severity: 3
    pre_mitigation_probability: 4
    sia_mitigation_logic: "APPEND_DISCLAIMER"
    mitigation_description: "Dynamically appends Annex III specific disclaimers (e.g., healthcare, legal) to output."
    residual_severity: 3
    residual_probability: 1

  HZ-15:
    failure_mode: "Malformed Input / System Crash"
    hazard_description: "System receives malformed data leading to crashes or unpredictable state."
    pre_mitigation_severity: 3
    pre_mitigation_probability: 4
    sia_mitigation_logic: "VALIDATE_INPUT_SCHEMA"
    mitigation_description: "Validates input token length and encodings (e.g., utf-8) per request."
    residual_severity: 3
    residual_probability: 1

  HZ-16:
    failure_mode: "Low Quality Output"
    hazard_description: "System generates inaccurate or non-robust outputs (Article 15.1)."
    pre_mitigation_severity: 4
    pre_mitigation_probability: 4
    sia_mitigation_logic: "REQUIRE_MINIMUM_CONFIDENCE"
    mitigation_description: "Enforces a minimum confidence threshold on outputs before they can be returned."
    residual_severity: 4
    residual_probability: 1

  HZ-17:
    failure_mode: "Ungrounded Response"
    hazard_description: "System generates facts without grounding in verified context."
    pre_mitigation_severity: 4
    pre_mitigation_probability: 4
    sia_mitigation_logic: "REQUIRE_RAG_GROUNDING"
    mitigation_description: "Ensures outputs are grounded in approved Retrieval-Augmented Generation sources."
    residual_severity: 4
    residual_probability: 1

  HZ-18:
    failure_mode: "Unverifiable Source"
    hazard_description: "User cannot trace the source of information provided by the AI."
    pre_mitigation_severity: 2
    pre_mitigation_probability: 5
    sia_mitigation_logic: "REQUIRE_SOURCE_ATTRIBUTION"
    mitigation_description: "Requires inline attribution/citation of the exact knowledge base source."
    residual_severity: 2
    residual_probability: 1

  HZ-19:
    failure_mode: "Copyright Infringement"
    hazard_description: "System outputs copyrighted material in violation of EU law (Article 53)."
    pre_mitigation_severity: 3
    pre_mitigation_probability: 4
    sia_mitigation_logic: "BLOCK_COPYRIGHTED_SOURCES"
    mitigation_description: "Blocks sources outside of the explicitly allowlisted internal KB or creative commons."
    residual_severity: 3
    residual_probability: 1

  HZ-20:
    failure_mode: "Deepfake Ambiguity"
    hazard_description: "Users unaware that content is AI-generated (Article 50.1)."
    pre_mitigation_severity: 2
    pre_mitigation_probability: 5
    sia_mitigation_logic: "APPEND_MACHINE_READABLE_MARKER"
    mitigation_description: "Injects HTTP headers marking content as AI-generated for machine parsability."
    residual_severity: 2
    residual_probability: 1

  HZ-21:
    failure_mode: "Unauthorized Deepfake Generation"
    hazard_description: "Generation of synthetic media without disclosure (Article 50.2)."
    pre_mitigation_severity: 3
    pre_mitigation_probability: 3
    sia_mitigation_logic: "BLOCK_SYNTHETIC_MEDIA_REQUEST"
    mitigation_description: "Blocks requests for deepfakes, face swaps, or synthetic voice impersonations."
    residual_severity: 3
    residual_probability: 1
