# configs/eu_ai_act_full.yaml

environments:
  active: ["prod", "staging"]

annex_iii_categories:
  employment: ["resume scoring", "hiring", "interview analysis"]
  healthcare: ["clinical triage", "medical diagnosis", "treatment recommendation"]
  biometrics: ["facial recognition", "emotion inference"]

articles:
  article_10_data_governance:
    paragraphs:
      article_10_2_f:
        description: "Examination in view of possible biases."
        rules:
          bias_check:
            logic: "BLOCK_PROHIBITED_DOMAINS"
            domains: ["hate_speech", "discriminatory_inference"]
      article_10_3:
        description: "Data sets must be relevant, representative, and free of errors."
        rules:
          pii_sanitization:
            logic: "STRIP_PII"
            on_fail: "REJECT"

  article_12_record_keeping:
    paragraphs:
      article_12_1:
        description: "Automatic recording of events over the system's lifetime."
        rules:
          traceability:
            logic: "REQUIRE_TRACEABILITY_HASH"
      article_12_2:
        description: "Retention period for traceability."
        rules:
          retention:
            logic: "ENFORCE_RETENTION"
            retention_policy: "10_YEARS"

  article_13_transparency:
    paragraphs:
      article_13_1:
        description: "Users must be informed they are interacting with an AI system."
        rules:
          watermarking:
            logic: "APPEND_WATERMARK"
            text: "This output was generated by an AI system."

  article_14_human_oversight:
    paragraphs:
      article_14_4:
        description: "Human override and intervention for high-risk systems."
        rules:
          hitl_gate:
            logic: "REQUIRE_HUMAN_VETO"
            applies_to_annex_iii: ["employment", "healthcare", "biometrics"]
            on_trigger: "HTTP_202_ACCEPTED"

  article_15_accuracy_robustness:
    paragraphs:
      article_15_1:
        description: "Appropriate level of accuracy and metrics."
        rules:
          min_accuracy:
            logic: "REQUIRE_MINIMUM_CONFIDENCE"
            min_confidence: 0.85
      article_15_3:
        description: "Resilience against errors, faults, and inconsistencies."
        rules:
          truth_razor:
            logic: "REQUIRE_RAG_GROUNDING"
            on_fail: "BLOCK_AND_REWRITE"
            rewrite_template: "[SIA BLOCK]: Output could not be deterministically verified against Authorized Truth-Centers."
