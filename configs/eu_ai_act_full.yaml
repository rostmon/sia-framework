# configs/eu_ai_act_full.yaml

environments:
  active: ["prod", "staging"]

# Annex III High-Risk Categories
annex_iii_categories:
  employment: ["resume scoring", "hiring", "interview analysis"]
  healthcare: ["clinical triage", "medical diagnosis", "treatment recommendation"]
  biometrics: ["facial recognition", "emotion inference"]

articles:
  article_10_data_governance:
    description: "Ensure datasets are relevant, representative, and free of errors."
    rules:
      pii_sanitization:
        logic: "STRIP_PII"
        on_fail: "REJECT"
      bias_check:
        logic: "BLOCK_PROHIBITED_DOMAINS"
        domains: ["hate_speech", "discriminatory_inference"]

  article_12_record_keeping:
    description: "Automatic logging of events to ensure traceability."
    rules:
      traceability:
        logic: "REQUIRE_TRACEABILITY_HASH"
        retention_policy: "10_YEARS"

  article_13_transparency:
    description: "Clear instructions and transparency that users are interacting with AI."
    rules:
      watermarking:
        logic: "APPEND_WATERMARK"
        text: "This output was generated by an AI system."

  article_14_human_oversight:
    description: "Design features that allow for effective human intervention."
    rules:
      hitl_gate:
        # If the task matches an Annex III category, trigger a human review
        logic: "REQUIRE_HUMAN_VETO"
        applies_to_annex_iii: ["employment", "healthcare", "biometrics"]
        on_trigger: "HTTP_202_ACCEPTED" # Do not block immediately, queue for review

  article_15_accuracy_robustness:
    description: "High levels of accuracy, robustness, and cybersecurity."
    rules:
      truth_razor:
        logic: "REQUIRE_RAG_GROUNDING"
        min_confidence: 0.85
        on_fail: "BLOCK_AND_REWRITE"
        rewrite_template: "[SIA BLOCK]: Output could not be deterministically verified against Authorized Truth-Centers."
