# configs/eu_ai_act_full.yaml
# ============================================================
# SIA Governance-as-Code — Three-Tier Taxonomy Ruleset
# EU AI Act (Regulation EU 2024/1689)
#
# Rule Categories:
#   runtime_gate          — Evaluated on every API call. Produces HTTP codes.
#   deployment_assertion  — Validated once at SIAClient startup. Raises SIAConfigError.
#   governance_doc        — Organisational obligation. No runtime behavior. Evidence only.
# ============================================================

environments:
  active: ["prod", "staging"]

annex_iii_categories:
  employment:      ["resume scoring", "hiring", "interview analysis", "candidate screening"]
  healthcare:      ["clinical triage", "medical diagnosis", "treatment recommendation", "patient risk"]
  biometrics:      ["facial recognition", "emotion inference", "voice biometrics"]
  education:       ["student assessment", "exam proctoring", "admission scoring"]
  critical_infra:  ["power grid", "water supply", "financial system access"]
  law_enforcement: ["suspect profiling", "crime prediction", "evidence scoring"]
  migration:       ["asylum application", "visa assessment", "border control"]
  justice:         ["sentencing recommendation", "legal verdict assistance"]

articles:

  # ══════════════════════════════════════════════════════════════
  # CHAPTER II — PROHIBITED AI PRACTICES
  # Category: runtime_gate (hard blocks, HTTP 451)
  # ══════════════════════════════════════════════════════════════
  article_5_prohibited_practices:
    paragraphs:
      article_5_1_a:
        description: "Prohibition: subliminal techniques beyond a person's consciousness."
        rules:
          rule_block_subliminal:
            category: runtime_gate
            logic: "BLOCK_PROHIBITED_PRACTICES"
            api_response_on_block: 451
            practices: ["subliminal_manipulation", "neuro_marketing_covert"]

      article_5_1_b:
        description: "Prohibition: exploiting vulnerabilities of specific groups."
        rules:
          rule_block_vulnerability_exploitation:
            category: runtime_gate
            logic: "BLOCK_PROHIBITED_PRACTICES"
            api_response_on_block: 451
            practices: ["exploit_elderly", "exploit_disability", "exploit_children"]

      article_5_1_c:
        description: "Prohibition: social scoring by public authorities."
        rules:
          rule_block_social_scoring:
            category: runtime_gate
            logic: "BLOCK_PROHIBITED_PRACTICES"
            api_response_on_block: 451
            practices: ["social_scoring", "citizen_ranking"]

      article_5_1_d:
        description: "Prohibition: real-time biometric identification in public spaces."
        rules:
          rule_block_rtbi:
            category: runtime_gate
            logic: "BLOCK_PROHIBITED_PRACTICES"
            api_response_on_block: 451
            practices: ["real_time_biometrics_public", "live_cctv_face_match"]

  # ══════════════════════════════════════════════════════════════
  # CHAPTER III — HIGH-RISK AI REQUIREMENTS
  # ══════════════════════════════════════════════════════════════

  article_9_risk_management:
    paragraphs:
      article_9_2:
        description: "Risk management system must be iterative throughout the lifecycle."
        rules:
          rule_risk_classification:
            category: deployment_assertion  # Validate annex_iii_categories are defined at startup
            logic: "REQUIRE_RISK_CLASSIFICATION"
            annex_iii_check: true

      article_9_5:
        description: "Risk estimation and evaluation for each known hazard scenario."
        rules:
          rule_hazard_evaluation:
            category: governance_doc  # Satisfied by RISK_MANAGEMENT_SUMMARY.md hazard matrix
            logic: "ENFORCE_HAZARD_SCORE"
            evidence_document: "docs/RISK_MANAGEMENT_SUMMARY.md"
            max_acceptable_residual_risk: "LOW"

  article_10_data_governance:
    paragraphs:
      article_10_2:
        description: "Dataset quality, representativeness, and bias examination."
        rules:
          rule_validate_profile_match:
            category: runtime_gate
            logic: "VALIDATE_PROFILE_MATCH"
            api_response_on_block: 400
            representative_subgroups: ["adult", "geriatric", "pediatric"]

      article_10_2_f:
        description: "Examination of possible biases in data sets."
        rules:
          rule_bias_detection:
            category: runtime_gate
            logic: "BLOCK_PROHIBITED_DOMAINS"
            api_response_on_block: 400
            domains: ["hate_speech", "discriminatory_inference", "racial_profiling", "gender_discrimination"]

      article_10_3:
        description: "Data sets must be relevant, representative, and free of errors."
        rules:
          rule_pii_sanitization:
            category: runtime_gate
            logic: "STRIP_PII"
            api_response_on_block: 200  # Transform, not block — continues with sanitized prompt
            pii_types: ["email", "phone", "ssn", "passport", "credit_card", "ip_address"]

      article_10_5:
        description: "Special categories of personal data may only be used when strictly necessary."
        rules:
          rule_sensitive_data_gate:
            category: runtime_gate
            logic: "BLOCK_SPECIAL_CATEGORY_DATA"
            api_response_on_block: 403
            categories: ["health_data", "racial_ethnic_origin", "political_opinions",
                         "religious_beliefs", "genetic_data", "sexual_orientation"]

  article_11_technical_documentation:
    paragraphs:
      article_11_1:
        description: "Technical documentation must be drawn up before placing on market."
        rules:
          rule_tech_doc_present:
            category: deployment_assertion  # Checked at SIAClient init
            logic: "VALIDATE_SYSTEM_METADATA"
            required_fields: ["system_version", "intended_purpose", "provider_name", "deployment_env"]

  article_12_record_keeping:
    paragraphs:
      article_12_1:
        description: "Automatic recording of events over the system's lifetime."
        rules:
          rule_cryptographic_trace:
            category: runtime_gate  # Every inference generates a SHA-256 ledger entry
            logic: "REQUIRE_TRACEABILITY_HASH"
            hash_algorithm: "SHA-256"

      article_12_2:
        description: "Audit logs must be retained for the defined period."
        rules:
          rule_log_retention:
            category: deployment_assertion  # Verified at startup: path exists + retention configured
            logic: "ENFORCE_RETENTION"
            retention_years: 10
            retention_path: "logs/audit_ledger.jsonl"

  article_13_transparency:
    paragraphs:
      article_13_1:
        description: "Users must be informed they are interacting with an AI system."
        rules:
          rule_append_watermark:
            category: runtime_gate  # Appended to every compliant egress response
            logic: "APPEND_WATERMARK"
            api_response_on_block: 200
            text: "This output was generated by an AI system (SIA-Governed)."
            position: "footer"

      article_13_2:
        description: "Instructions for use must specify system capabilities and limitations."
        rules:
          rule_capability_disclaimer:
            category: runtime_gate  # Dynamic disclaimer based on Annex III category detected
            logic: "APPEND_DISCLAIMER"
            api_response_on_block: 200
            healthcare_disclaimer: "DISCLAIMER: This system cannot substitute for licensed medical advice."
            employment_disclaimer:  "DISCLAIMER: This output is advisory only and must be reviewed by a qualified HR professional."
            legal_disclaimer:       "DISCLAIMER: This system does not provide legal advice."
          rule_append_confidence_telemetry:
            category: runtime_gate
            logic: "APPEND_CONFIDENCE_TELEMETRY"
            api_response_on_block: 200

      article_13_3_b:
        description: "Specification of input data the system is designed to handle."
        rules:
          rule_input_schema_validation:
            category: runtime_gate  # Enforced per-request: token/encoding limits
            logic: "VALIDATE_INPUT_SCHEMA"
            api_response_on_block: 400
            max_prompt_length: 8192
            allowed_encodings: ["utf-8", "utf-16"]

  article_14_human_oversight:
    paragraphs:
      article_14_1:
        description: "AI system design must allow effective human oversight mechanisms."
        rules:
          rule_override_capability:
            category: governance_doc  # Architectural design control — satisfied by HUMAN_VETO pattern
            logic: "ENSURE_OVERRIDE_POSSIBLE"
            evidence_document: "docs/SYSTEM_DESCRIPTION.md"
            override_mechanisms: ["human_veto", "stop_signal", "manual_correction"]

      article_14_4:
        description: "Operators must be able to intervene or interrupt the AI system."
        rules:
          rule_hitl_gate:
            category: runtime_gate
            logic: "REQUIRE_HUMAN_VETO"
            api_response_on_trigger: 202
            applies_to_annex_iii: ["employment", "healthcare", "biometrics", "education",
                                   "law_enforcement", "migration", "justice"]
            on_trigger: "HTTP_202_ACCEPTED"
            timeout_seconds: 3600

      article_14_5:
        description: "Deployers must monitor the operation of the AI system."
        rules:
          rule_drift_monitoring:
            category: governance_doc  # Operational monitoring plan — not a per-request gate
            logic: "MONITOR_CONFIDENCE_DRIFT"
            evidence_document: "docs/SIA_VALIDATION_REPORT.md"
            alert_threshold_drop: 0.15

  article_15_accuracy_robustness:
    paragraphs:
      article_15_1:
        description: "Appropriate level of accuracy and defined performance metrics."
        rules:
          rule_enforce_minimum_confidence:
            category: runtime_gate
            logic: "REQUIRE_MINIMUM_CONFIDENCE"
            api_response_on_block: 422
            min_confidence: 0.85
            fallback_action: "BLOCK_AND_REWRITE"
          rule_block_ood_payload:
            category: runtime_gate
            logic: "BLOCK_OOD_PAYLOAD"
            api_response_on_block: 400
            allowed_semantic_domains: ["clinical", "compliance", "general_qa"]

      article_15_2:
        description: "Accuracy metrics must be declared in technical documentation."
        rules:
          rule_declare_accuracy_metrics:
            category: deployment_assertion  # Validated at startup: config must declare metrics
            logic: "VALIDATE_ACCURACY_METADATA"
            required_metrics: ["precision", "recall", "f1_score"]

      article_15_3:
        description: "Resilience against errors, faults, and output inconsistencies."
        rules:
          rule_verify_rag_sources:
            category: runtime_gate
            logic: "REQUIRE_RAG_GROUNDING"
            api_response_on_block: 422
          rule_rag_source_attribution:
            category: runtime_gate
            logic: "REQUIRE_SOURCE_ATTRIBUTION"
            api_response_on_block: 200
            attribution_format: "[Source: {document_id}]"
          rule_rag_copyright_check:
            category: runtime_gate
            logic: "BLOCK_COPYRIGHTED_SOURCES"
            api_response_on_block: 422
            allowlisted_domains: ["internal_kb", "approved_regulatory_corpus"]
          rule_hallucination_fallback:
            category: runtime_gate
            logic: "BLOCK_AND_REWRITE"
            api_response_on_block: 422
            rewrite_template: "[SIA BLOCK]: Output could not be deterministically verified. Please consult authoritative sources."

      article_15_4:
        description: "Cybersecurity resilience against attempts to alter system performance."
        rules:
          rule_prompt_injection_defense:
            category: runtime_gate
            logic: "BLOCK_PROMPT_INJECTION"
            api_response_on_block: 400
            patterns: ["IGNORE_PREVIOUS", "SYSTEM_OVERRIDE", "JAILBREAK", "DAN_MODE",
                       "IGNORE ALL PREVIOUS", "disregard previous instructions"]
          rule_token_limit_defense:
            category: runtime_gate
            logic: "ENFORCE_TOKEN_LIMIT"
            api_response_on_block: 400
            max_tokens: 4096

  # ══════════════════════════════════════════════════════════════
  # CHAPTER IV — TRANSPARENCY FOR CERTAIN AI SYSTEMS
  # ══════════════════════════════════════════════════════════════
  article_50_transparency_obligations:
    paragraphs:
      article_50_1:
        description: "AI-generated content must be machine-readable marked."
        rules:
          rule_ai_content_marking:
            category: runtime_gate  # Injected into every response HTTP header
            logic: "APPEND_MACHINE_READABLE_MARKER"
            api_response_on_block: 200
            header_field: "X-SIA-AI-Generated"
            header_value: "true"

      article_50_2:
        description: "Synthetic media (deepfakes) must be disclosed or blocked."
        rules:
          rule_synthetic_media_block:
            category: runtime_gate
            logic: "BLOCK_SYNTHETIC_MEDIA_REQUEST"
            api_response_on_block: 451
            practices: ["deepfake_generation", "synthetic_voice_impersonation", "face_swap"]

  # ══════════════════════════════════════════════════════════════
  # CHAPTER V — GENERAL PURPOSE AI (GPAI) OBLIGATIONS
  # ══════════════════════════════════════════════════════════════
  article_53_gpai_obligations:
    paragraphs:
      article_53_1_c:
        description: "GPAI providers must respect EU copyright law including TDM reservations."
        rules:
          rule_copyright_compliance:
            category: runtime_gate
            logic: "BLOCK_COPYRIGHTED_SOURCES"
            api_response_on_block: 422
            allowlisted_domains: ["internal_kb", "approved_regulatory_corpus", "creative_commons"]

  # ══════════════════════════════════════════════════════════════
  # CHAPTER IX — POST-MARKET MONITORING
  # ══════════════════════════════════════════════════════════════
  article_72_post_market_monitoring:
    paragraphs:
      article_72_1:
        description: "Providers shall have a post-market monitoring plan for high-risk AI."
        rules:
          rule_incident_logging:
            category: governance_doc  # Covered by audit_ledger.jsonl + SIA_VALIDATION_REPORT
            logic: "REQUIRE_INCIDENT_LOG"
            evidence_document: "logs/audit_ledger.jsonl"
            incident_threshold_confidence: 0.50
          rule_anomaly_detection:
            category: governance_doc  # Operational plan — not a per-request gate
            logic: "MONITOR_ANOMALIES"
            evidence_document: "docs/SIA_VALIDATION_REPORT.md"
            consecutive_block_alert: 5
