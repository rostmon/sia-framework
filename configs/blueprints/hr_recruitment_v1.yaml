metadata:
  version: "1.0"
  description: "SIA Governance Blueprint for HR and Recruitment Systems"
  industry: "hr"
  strict_mode: true

articles:
  article_5_prohibited_practices:
    rules:
      rule_block_prohibited:
        logic: BLOCK_PROHIBITED_PRACTICES
        keywords: ["subliminal", "social scoring", "emotion recognition in workplace"]

  article_10_data_governance:
    rules:
      rule_pii:
        logic: STRIP_PII
        active: true
      rule_bias:
        logic: BLOCK_PROHIBITED_DOMAINS
        domains: ["gender_bias", "racial_profiling", "age_discrimination"]

  article_14_human_oversight:
    rules:
      rule_hitl_gate:
        logic: REQUIRE_HUMAN_VETO
        applies_to_annex_iii:
          - employment

  article_13_transparency:
    rules:
      rule_capability_disclaimer:
        logic: APPEND_DISCLAIMER
        employment_disclaimer: "NOTICE: This system assists in recruitment and evaluation. Decisions are subject to human review."
