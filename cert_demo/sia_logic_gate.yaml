environments:
  active: ["prod", "staging"]

annex_iii_categories:
  finance: ["credit scoring", "loan application", "insurance risk", "banking"]
  employment: ["cv", "recruitment", "interview", "hr"]

articles:
  article_5_prohibited_practices:
    paragraphs:
      article_5_1_c:
        description: "Ban on social scoring"
        rules:
          rule_block_prohibited:
            logic: BLOCK_PROHIBITED_PRACTICES
            keywords: ["subliminal", "social scoring", "biometric classification"]

  article_10_data_governance:
    paragraphs:
      article_10_3:
        description: "PII protection"
        rules:
          rule_pii:
            logic: STRIP_PII
            active: true

  article_14_human_oversight:
    paragraphs:
      article_14_4:
        description: "Human oversight for high-risk systems"
        rules:
          rule_hitl_gate:
            logic: REQUIRE_HUMAN_VETO
            applies_to_annex_iii:
              - finance

  article_13_transparency:
    paragraphs:
      article_13_2:
        description: "Contextual disclaimer"
        rules:
          rule_capability_disclaimer:
            logic: APPEND_DISCLAIMER
            position: "suffix"
            attribution_format: "SIA_CERTIFIED"
            text: "This financial analysis was generated by an AI system. Review by a qualified advisor is recommended."
