environments:
  active: ["prod", "staging"]

annex_iii_categories:
  healthcare: ["medical records", "diagnostic support", "patient data", "healthcare"]
  employment: ["cv", "recruitment", "interview", "hr"]

articles:
  article_5_prohibited_practices:
    paragraphs:
      article_5_1_c:
        description: "Ban on social scoring"
        rules:
          rule_block_prohibited:
            logic: BLOCK_PROHIBITED_PRACTICES
            keywords: ["subliminal", "social scoring", "biometric classification"]

  article_10_data_governance:
    paragraphs:
      article_10_3:
        description: "PII protection"
        rules:
          rule_pii:
            logic: STRIP_PII
            active: true
      article_10_5:
        description: "Sensitive data bias check"
        rules:
          rule_medical_data:
            logic: BLOCK_PROHIBITED_DOMAINS
            domains: ["unverified_health_data"]

  article_14_human_oversight:
    paragraphs:
      article_14_4:
        description: "Human oversight for high-risk systems"
        rules:
          rule_hitl_gate:
            logic: REQUIRE_HUMAN_VETO
            applies_to_annex_iii:
              - healthcare

  article_13_transparency:
    paragraphs:
      article_13_2:
        description: "Contextual disclaimer"
        rules:
          rule_capability_disclaimer:
            logic: APPEND_DISCLAIMER
            healthcare_disclaimer: "WARNING: This system provides informational health content and is not a substitute for professional medical advice."
